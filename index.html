<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Приюти за животни в България</title>
  <link rel="icon" type="image/png" href="tab-logo.png"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #fdf5ec;
      color: #3a3a3a;
    }

    /* ══════════════════════════════════
       HEADER
    ══════════════════════════════════ */
    header {
      background: #cd6a18;
      color: white;
      padding: 10px 24px 20px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      overflow: visible;
      position: relative;
      z-index: 1000;
    }
    header img.logo {
      height: 110px; width: auto; display: block;
      margin-top: -20px; margin-bottom: -20px;
      flex-shrink: 0;
      cursor: pointer;
    }
    .header-text { flex: 1; text-align: center; min-width: 0; }
    header h1 {
      font-size: 1.35rem; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
    }
    header p {
      font-size: 0.85rem; opacity: 0.80;
      margin-top: 4px; font-weight: 400; letter-spacing: 0.3px;
    }

    /* Mobile map shortcut button — hidden on desktop */
    .header-map-btn {
      display: none;
      background: rgba(255,255,255,0.2);
      border: 1.5px solid rgba(255,255,255,0.5);
      border-radius: 10px;
      color: white;
      font-size: 1.2rem;
      width: 40px; height: 40px;
      align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }
    .header-map-btn:active { background: rgba(255,255,255,0.35); }

    /* ══════════════════════════════════
       CONTROLS BAR
    ══════════════════════════════════ */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 10px;
      padding: 10px 20px;
      background: #fdf5ec;
      border-bottom: 1px solid #f5d4ae;
      align-items: center;
      position: relative;
      z-index: 999;
    }

    /* Each label+input pair */
    .filter-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .filter-group label {
      font-size: 0.82rem; font-weight: 600;
      color: #cd6a18; white-space: nowrap; flex-shrink: 0;
    }
    .filter-group select,
    .filter-group input {
      padding: 6px 12px;
      border: 1.5px solid #e8b07a;
      border-radius: 20px;
      font-size: 0.85rem;
      background: white; color: #3a3a3a;
      outline: none; cursor: pointer;
      font-family: 'Montserrat', sans-serif;
      min-width: 0;
    }
    .filter-group select:focus,
    .filter-group input:focus { border-color: #cd6a18; }
    .filter-group--search { flex: 1; min-width: 150px; }
    .filter-group--search input { width: 100%; }

    /* Right-side: count + toggle */
    .controls-end {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
    }
    .shelter-count {
      font-size: 0.8rem; color: #888; white-space: nowrap;
    }

    /* View toggle */
    .view-toggle {
      display: flex;
      border: 1.5px solid #e8b07a;
      border-radius: 20px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .view-toggle button {
      padding: 5px 14px;
      border: none;
      background: white;
      color: #888;
      font-size: 0.8rem; font-weight: 600;
      font-family: 'Montserrat', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .view-toggle button.active { background: #cd6a18; color: white; }

    /* ══════════════════════════════════
       MAP
    ══════════════════════════════════ */
    html { height: 100%; }
    body { height: 100%; overflow-y: auto; }
    #map { height: calc(100svh - 115px); width: 100%; position: relative; }

    /* Fullscreen map */
    #map.map-fullscreen {
      position: fixed !important;
      inset: 0 !important;
      height: 100% !important;
      width: 100% !important;
      z-index: 2000;
    }

    /* Fullscreen button */
    #map-fullscreen-btn {
      position: absolute;
      top: 10px; right: 10px;
      z-index: 1000;
      background: white;
      border: 2px solid rgba(0,0,0,0.2);
      border-radius: 6px;
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      box-shadow: 0 1px 5px rgba(0,0,0,0.18);
      transition: background 0.15s;
      color: #444;
    }
    #map-fullscreen-btn:hover { background: #f5f5f5; }
    /* Hide default Leaflet fullscreen if any */

    /* ══════════════════════════════════
       CATALOGUE
    ══════════════════════════════════ */
    #catalogue {
      display: none;
      padding: 24px;
      padding-bottom: 60px;
    }
    #catalogue.visible { display: block; }

    .catalogue-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ══════════════════════════════════
       FLIP CARD
    ══════════════════════════════════ */
    .shelter-card {
      perspective: 1200px;
      background: transparent;
      box-shadow: none;
      overflow: visible;
      cursor: pointer;
      border-radius: 16px;
    }
    .card-inner {
      position: relative;
      width: 100%; height: 100%;
      transition: transform 0.55s cubic-bezier(.4,0,.2,1);
      transform-style: preserve-3d;
    }
    .shelter-card.flipped .card-inner { transform: rotateY(180deg); }

    .card-front, .card-back {
      position: absolute; inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .card-front {
      cursor: pointer;
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .card-front:hover {
      box-shadow: 0 6px 20px rgba(205,106,24,0.18);
      transform: translateY(-3px);
    }
    .card-back {
      transform: rotateY(180deg);
      overflow-y: auto;
    }

    /* Card front content */
    .card-image-wrap {
      position: relative; width: 100%; height: 190px;
      overflow: hidden; flex-shrink: 0;
    }
    .card-image-wrap img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .card-image-placeholder {
      width: 100%; height: 190px;
      background: linear-gradient(135deg, #cd6a18 0%, #a85412 100%);
      display: flex; align-items: center;
      justify-content: center; font-size: 2.5rem;
      flex-shrink: 0;
    }
    /* Card image nav arrows */
    .card-img-arrow {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(0,0,0,0.45); color: white;
      border: none; border-radius: 50%;
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; cursor: pointer; z-index: 2;
      opacity: 0; transition: opacity 0.2s;
      padding: 0; line-height: 1;
    }
    .card-img-arrow.prev { left: 7px; }
    .card-img-arrow.next { right: 7px; }
    .card-image-wrap:hover .card-img-arrow { opacity: 1; }
    .card-img-arrow:hover { background: rgba(0,0,0,0.7); }
    /* Dot indicators */
    .card-img-dots {
      position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 5px; z-index: 2;
    }
    .card-img-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,255,255,0.5);
      transition: background 0.2s;
      cursor: pointer;
    }
    .card-img-dot.active { background: white; }

    .card-img-count {
      position: absolute; bottom: 8px; right: 10px;
      background: rgba(0,0,0,0.55); color: white;
      font-size: 0.72rem; font-weight: 700;
      padding: 3px 9px; border-radius: 20px;
    }
    .card-body { padding: 16px 18px 12px; flex: 1; display: flex; flex-direction: column; }
    .card-name { font-size: 1rem; font-weight: 700; color: #cd6a18; margin-bottom: 4px; }
    .card-city { font-size: 0.78rem; color: #888; margin-bottom: 10px; }
    .card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
    .card-tag {
      background: #fdf0e4; color: #cd6a18;
      border: 1px solid #e8b07a;
      border-radius: 12px; padding: 2px 10px;
      font-size: 0.72rem; font-weight: 600;
    }
    .card-row {
      display: flex; align-items: flex-start;
      gap: 8px; margin-bottom: 8px;
      font-size: 0.82rem; color: #444; line-height: 1.5;
    }
    .card-row-icon { font-size: 0.9rem; flex-shrink: 0; margin-top: 1px; }
    .card-spacer { flex: 1; min-height: 8px; }
    .card-flip-hint {
      font-size: 0.73rem; color: #cd6a18;
      text-align: right; opacity: 0.75;
      padding-top: 6px; font-weight: 600;
    }

    /* Card back content */
    .card-back-header {
      background: #cd6a18; color: white;
      padding: 14px 16px;
      display: flex; align-items: center;
      justify-content: space-between; gap: 8px;
      flex-shrink: 0;
    }
    .card-back-name { font-size: 0.95rem; font-weight: 700; line-height: 1.3; }
    .card-flip-back-btn {
      background: rgba(255,255,255,0.2); border: none; color: white;
      width: 30px; height: 30px; border-radius: 50%;
      font-size: 1rem; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .card-flip-back-btn:hover { background: rgba(255,255,255,0.35); }
    .card-back-body {
      padding: 14px 16px; flex: 1;
      display: flex; flex-direction: column; gap: 12px;
      overflow-y: auto;
    }
    .card-back-section-title {
      font-size: 0.68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.8px;
      color: #cd6a18; margin-bottom: 5px;
    }
    .card-needs-back { background: #fdf5ec; border-radius: 10px; padding: 10px 12px; }
    .card-need-item {
      font-size: 0.8rem; color: #555;
      padding-left: 12px; position: relative;
      margin-bottom: 3px; line-height: 1.4;
    }
    .card-need-item::before { content: '•'; color: #cd6a18; position: absolute; left: 0; }
    .card-back-links { display: flex; flex-wrap: wrap; gap: 6px; }
    .card-link {
      padding: 5px 14px; border-radius: 10px;
      text-decoration: none; font-size: 0.78rem; font-weight: 600;
      transition: background 0.2s;
    }
    .card-link.primary { background: #cd6a18; color: white; }
    .card-link.primary:hover { background: #a85412; }
    .card-link.secondary { background: #f5d4ae; color: #a85412; }
    .card-link.secondary:hover { background: #e8b07a; }
    .card-open-panel-btn {
      margin-top: auto;
      padding: 9px 16px;
      background: transparent; border: 1.5px solid #cd6a18;
      border-radius: 10px; color: #cd6a18;
      font-size: 0.82rem; font-weight: 700;
      font-family: 'Montserrat', sans-serif;
      cursor: pointer; transition: all 0.2s;
      text-align: center; flex-shrink: 0;
    }
    .card-open-panel-btn:hover { background: #cd6a18; color: white; }

    /* ══════════════════════════════════
       MAP POPUP
    ══════════════════════════════════ */
    .leaflet-popup-content-wrapper {
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.18);
      border-top: 4px solid #cd6a18;
      padding: 0; min-width: 230px;
    }
    .leaflet-popup-content { margin: 0; padding: 0; }
    .popup-inner { padding: 14px 16px 12px; }
    .popup-name { font-size: 0.95rem; font-weight: 700; color: #cd6a18; margin-bottom: 3px; }
    .popup-city { font-size: 0.78rem; color: #888; margin-bottom: 10px; }
    .popup-tag {
      display: inline-block; background: #fdf0e4; color: #cd6a18;
      border: 1px solid #e8b07a; border-radius: 12px;
      padding: 2px 9px; font-size: 0.72rem; font-weight: 600;
      margin: 2px 2px 2px 0;
    }
    .popup-days { margin-bottom: 10px; }
    .popup-more-btn {
      display: block; width: 100%; margin-top: 10px;
      padding: 8px; background: #cd6a18; color: white;
      border: none; border-radius: 10px;
      font-size: 0.82rem; font-weight: 700;
      font-family: 'Montserrat', sans-serif;
      cursor: pointer; transition: background 0.2s; text-align: center;
    }
    .popup-more-btn:hover { background: #a85412; }

    /* ══════════════════════════════════
       SIDE PANEL
    ══════════════════════════════════ */
    #shelter-panel {
      position: fixed;
      top: 0; right: -480px;
      width: 440px; max-width: 95vw; height: 100%;
      background: white;
      box-shadow: -4px 0 24px rgba(0,0,0,0.18);
      z-index: 2000;
      transition: right 0.35s cubic-bezier(.4,0,.2,1);
      display: flex; flex-direction: column; overflow: hidden;
    }
    #shelter-panel.open { right: 0; }

    #panel-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 1999; display: none;
      backdrop-filter: blur(2px);
    }
    #panel-overlay.open { display: block; }

    .panel-gallery { flex-shrink: 0; }
    .panel-gallery-main { position: relative; width: 100%; height: 220px; overflow: hidden; }
    .panel-gallery-main img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: opacity 0.3s; cursor: zoom-in;
    }
    .panel-gallery-arrow {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(0,0,0,0.45); color: white;
      border: none; width: 34px; height: 34px;
      border-radius: 50%; font-size: 1rem;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      transition: background 0.2s; z-index: 10;
    }
    .panel-gallery-arrow:hover { background: rgba(0,0,0,0.7); }
    .panel-gallery-arrow.prev { left: 10px; }
    .panel-gallery-arrow.next { right: 10px; }
    .panel-gallery-counter {
      position: absolute; bottom: 8px; right: 10px;
      background: rgba(0,0,0,0.55); color: white;
      font-size: 0.72rem; font-weight: 700;
      padding: 3px 9px; border-radius: 20px;
    }
    .panel-gallery-thumbs {
      display: flex; gap: 6px;
      padding: 8px 10px; overflow-x: auto;
      background: #f5f5f5;
    }
    .panel-gallery-thumbs img {
      width: 56px; height: 42px;
      object-fit: cover; border-radius: 6px;
      cursor: pointer; opacity: 0.65;
      border: 2px solid transparent;
      transition: opacity 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }
    .panel-gallery-thumbs img.active { opacity: 1; border-color: #cd6a18; }
    .panel-img-placeholder {
      width: 100%; height: 180px;
      background: linear-gradient(135deg, #cd6a18 0%, #a85412 100%);
      display: flex; align-items: center;
      justify-content: center; font-size: 3rem;
      flex-shrink: 0;
    }
    .panel-header {
      background: #cd6a18; color: white;
      padding: 18px 20px;
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 10px;
      flex-shrink: 0;
    }
    .panel-header-name { font-size: 1.1rem; font-weight: 700; line-height: 1.3; }
    .panel-header-city { font-size: 0.8rem; opacity: 0.85; margin-top: 3px; }
    .panel-close {
      background: rgba(255,255,255,0.2); border: none; color: white;
      width: 32px; height: 32px; border-radius: 50%;
      font-size: 1.1rem; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .panel-close:hover { background: rgba(255,255,255,0.35); }
    .panel-body { padding: 20px; overflow-y: auto; flex: 1; }
    .panel-section { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #f5d4ae; }
    .panel-section:last-child { border-bottom: none; margin-bottom: 0; }
    .panel-section-title {
      font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      color: #cd6a18; margin-bottom: 8px;
    }
    .panel-section-body { font-size: 0.88rem; color: #444; line-height: 1.6; }
    .panel-tag {
      display: inline-block; background: #fdf0e4; color: #cd6a18;
      border: 1px solid #e8b07a; border-radius: 12px;
      padding: 3px 12px; font-size: 0.78rem; font-weight: 600;
      margin: 3px 3px 3px 0;
    }
    .panel-need {
      display: flex; align-items: flex-start;
      gap: 8px; margin-bottom: 6px;
      font-size: 0.85rem; color: #444;
    }
    .panel-need::before { content: '•'; color: #cd6a18; font-weight: 700; flex-shrink: 0; }
    .panel-links { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
    .panel-links a {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 16px; border-radius: 12px;
      text-decoration: none; font-size: 0.82rem; font-weight: 600;
      transition: background 0.2s;
    }
    .panel-links a.primary { background: #cd6a18; color: white; }
    .panel-links a.primary:hover { background: #a85412; }
    .panel-links a.secondary { background: #f5d4ae; color: #a85412; }
    .panel-links a.secondary:hover { background: #e8b07a; }

    /* ══════════════════════════════════
       DONATE SECTION
    ══════════════════════════════════ */
    .donate-section {
      background: #fff8f0;
      border: 1.5px solid #f5d4ae;
      border-radius: 12px;
      padding: 14px 16px;
      margin-top: 2px;
    }
    .donate-section-title {
      font-size: 0.78rem; font-weight: 700;
      color: #cd6a18; text-transform: uppercase;
      letter-spacing: 0.8px; margin-bottom: 10px;
      display: flex; align-items: center; gap: 6px;
    }
    .donate-section-title::before { content: '💛'; font-size: 0.9rem; }
    .donate-row {
      display: flex; align-items: flex-start;
      gap: 6px; margin-bottom: 6px;
      font-size: 0.82rem; color: #444; line-height: 1.5;
    }
    .donate-label {
      font-weight: 700; color: #888; font-size: 0.75rem;
      min-width: 60px; flex-shrink: 0; padding-top: 1px;
      text-transform: uppercase; letter-spacing: 0.4px;
    }
    .donate-value {
      font-family: 'Courier New', monospace; font-size: 0.82rem;
      color: #3a3a3a; word-break: break-all;
    }
    .donate-link {
      display: inline-block; padding: 6px 14px;
      background: #cd6a18; color: white;
      border-radius: 10px; text-decoration: none;
      font-size: 0.78rem; font-weight: 600;
      margin-top: 6px; margin-right: 6px;
      transition: background 0.2s;
    }
    .donate-link:hover { background: #a85412; }
    .donate-link.alt { background: #f5d4ae; color: #a85412; }
    .donate-link.alt:hover { background: #e8b07a; }
    /* card back donate */
    .card-donate {
      background: #fff8f0;
      border: 1.5px solid #f5d4ae;
      border-radius: 10px;
      padding: 10px 12px;
      margin-top: 6px;
    }
    .card-donate-title {
      font-size: 0.72rem; font-weight: 700; color: #cd6a18;
      text-transform: uppercase; letter-spacing: 0.6px;
      margin-bottom: 7px;
      display: flex; align-items: center; gap: 5px;
    }
    .card-donate-title::before { content: '💛'; }
    .card-donate-row {
      font-size: 0.75rem; color: #555; margin-bottom: 4px;
      display: flex; gap: 5px; align-items: flex-start; line-height: 1.4;
    }
    .card-donate-label {
      font-weight: 700; color: #999; font-size: 0.68rem;
      text-transform: uppercase; min-width: 52px; flex-shrink: 0; padding-top: 1px;
    }
    .card-donate-value {
      font-family: 'Courier New', monospace; font-size: 0.75rem;
      word-break: break-all; color: #3a3a3a;
    }

    /* ══════════════════════════════════
       LIGHTBOX
    ══════════════════════════════════ */
    #lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.92); z-index: 9999;
      align-items: center; justify-content: center; flex-direction: column;
    }
    #lightbox.open { display: flex; }
    #lightbox-img {
      max-width: 92vw; max-height: 82vh;
      object-fit: contain; border-radius: 8px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      user-select: none; pointer-events: none;
    }
    #lightbox-counter {
      color: rgba(255,255,255,0.7); font-size: 0.85rem;
      margin-top: 14px; font-weight: 600; letter-spacing: 1px;
    }
    #lightbox-close {
      position: fixed; top: 18px; right: 22px;
      background: rgba(255,255,255,0.15); border: none; color: white;
      width: 44px; height: 44px; border-radius: 50%; font-size: 1.2rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    #lightbox-close:hover { background: rgba(255,255,255,0.3); }
    .lightbox-arrow {
      position: fixed; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.15); border: none; color: white;
      width: 50px; height: 50px; border-radius: 50%; font-size: 1.6rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }

window._cardCur = {};
function cardImgGo(shelterIdx, imgIdx) {
  const s = shelters[shelterIdx];
  if (!s.gallery || s.gallery.length < 2) return;
  window._cardCur[shelterIdx] = imgIdx;
  const imgEl = document.getElementById('card-img-' + shelterIdx);
  if (imgEl) imgEl.src = s.gallery[imgIdx];
  const wrap = imgEl && imgEl.closest('.card-image-wrap');
  if (wrap) {
    wrap.setAttribute('data-cur', imgIdx);
    wrap.querySelectorAll('.card-img-dot').forEach((d, i) => d.classList.toggle('active', i === imgIdx));
  }
}
function cardImgNav(shelterIdx, dir) {
  const s = shelters[shelterIdx];
  if (!s.gallery || s.gallery.length < 2) return;
  const cur = window._cardCur[shelterIdx] || 0;
  const next = (cur + dir + s.gallery.length) % s.gallery.length;
  cardImgGo(shelterIdx, next);
}

    ).join('');

          <img id="panel-main-img" src="${s.gallery[0]}" alt="${s.name}" onclick="openLightbox(window._panelGallery, window._panelCurrent)">

          ${total > 1 ? `
            <button class="panel-gallery-arrow prev" onclick="panelPrev()">&#8249;</button>
            <button class="panel-gallery-arrow next" onclick="panelNext()">&#8250;</button>
            <div class="panel-gallery-counter" id="panel-gallery-counter">1 / ${total}</div>
          ` : ''}
        </div>
        ${total > 1 ? `<div class="panel-gallery-thumbs" id="panel-thumbs">${thumbsHtml}</div>` : ''}
      </div>`;

    window._panelGallery = s.gallery;
    window._panelCurrent = 0;
    window.panelSetImg = function(i) {
      window._panelCurrent = i;
      document.getElementById('panel-main-img').src = window._panelGallery[i];
      document.getElementById('panel-gallery-counter').textContent = `${i+1} / ${window._panelGallery.length}`;
      document.querySelectorAll('#panel-thumbs img').forEach((t,ti) => t.classList.toggle('active', ti===i));
    };
    window.panelNext = function() { panelSetImg((window._panelCurrent+1) % window._panelGallery.length); };
    window.panelPrev = function() { panelSetImg((window._panelCurrent - 1 + window._panelGallery.length) % window._panelGallery.length); };
  } else {
    panelImg.innerHTML = `<div class="panel-img-placeholder">🐾</div>`;
  }

  document.getElementById('panel-name').textContent = s.name;
  document.getElementById('panel-city').textContent = '📍 ' + s.city + (s.address ? ' — ' + s.address : '');

  let html = '';

// ── Filters ──
function applyFilters() {
  const city = document.getElementById('cityFilter').value;
  const day  = document.getElementById('dayFilter').value;
  const q    = document.getElementById('searchInput').value.toLowerCase().trim();
  let visible = 0;
  const filteredShelters = [];

  markers.forEach(m => {
    const s = m._shelterData;
    const matchCity = city === 'all' || s.city === city;
    const matchDay  = day  === 'all' || s.walkDays.includes(day);
    const matchQ    = !q   || s.name.toLowerCase().includes(q) || s.city.toLowerCase().includes(q);
    if (matchCity && matchDay && matchQ) {
      m.addTo(map); visible++;
      filteredShelters.push(s);
    } else {
      map.removeLayer(m);
    }
  });

  document.getElementById('shelterCount').textContent = `${visible} от ${shelters.length} приюта`;
  buildCatalogue(filteredShelters);
  if (currentView === 'catalogue') equalizeCards();
}

// ── Equal-height flip cards ──
function equalizeCards() {
  setTimeout(() => {
    const cards  = document.querySelectorAll('.shelter-card');
    const inners = document.querySelectorAll('.card-inner');
    const fronts = document.querySelectorAll('.card-front');

    cards.forEach(c  => c.style.height  = '');
    inners.forEach(i => i.style.height  = '');

    fronts.forEach(f => { f.style.position = 'relative'; f.style.height = 'auto'; });
    let maxH = 0;
    fronts.forEach(f => { if (f.offsetHeight > maxH) maxH = f.offsetHeight; });
    fronts.forEach(f => { f.style.position = ''; f.style.height = ''; });

    if (maxH > 0) {
      const h = maxH + 'px';
      cards.forEach(c  => c.style.height = h);
      inners.forEach(i => i.style.height = h);
    }
  }, 80);
}

document.getElementById('cityFilter').addEventListener('change', applyFilters);
document.getElementById('dayFilter').addEventListener('change', applyFilters);
document.getElementById('searchInput').addEventListener('input', applyFilters);
applyFilters();

const BG_DAYS = ['Неделя','Понеделник','Вторник','Сряда','Четвъртък','Петък','Събота'];

function haversineKm(lat1, lng1, lat2, lng2) {
  const R = 6371, toRad = x => x * Math.PI / 180;
  const dLat = toRad(lat2 - lat1), dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
  return R * 2 * Math.asin(Math.sqrt(a));
}

function showSuggestion(s, idx, distKm, today, hasWalksToday) {
  const old = document.getElementById('suggestion-banner');
  if (old) old.remove();

  const dist = distKm < 1 ? 'под 1 км' : `${Math.round(distKm)} км`;

    ? `Днес (${today}) имат разходки!`
    : `Разходки: ${s.walkDays.join(', ')}`;

  const banner = document.createElement('div');
  banner.id = 'suggestion-banner';
  banner.innerHTML = `
    <div class="suggestion-inner">
      <div class="suggestion-icon">📍</div>
      <div class="suggestion-text">
        <div class="suggestion-title">Най-близкият приют до теб е <strong>${s.name}</strong></div>
        <div class="suggestion-sub">${s.city} · ${dist} от теб · ${walksNote}</div>
      </div>
      <button class="suggestion-btn" onclick="openPanel(${idx})">Виж →</button>
      <button class="suggestion-close" onclick="document.getElementById('suggestion-banner').remove()">✕</button>
    </div>`;

  document.querySelector('.controls').after(banner);
  if (currentView === 'map') map.setView([s.lat, s.lng], 11);
}

function handleLocation(lat, lng) {
  const today = BG_DAYS[new Date().getDay()];

  const ranked = shelters
    .map(s => ({ s, dist: haversineKm(lat, lng, s.lat, s.lng) }))
    .sort((a, b) => a.dist - b.dist);

  // Prefer nearest shelter with walks today, otherwise nearest overall
  const best = ranked.find(r => r.s.walkDays.includes(today)) || ranked[0];
  const idx  = shelters.indexOf(best.s);

  // Instantly update all three filters
  document.getElementById('dayFilter').value  = today;
  document.getElementById('cityFilter').value = best.s.city;
  document.getElementById('searchInput').value = '';
  applyFilters();

  // Briefly flash the shelter count so the user notices it updated
  const countEl = document.getElementById('shelterCount');
  countEl.style.transition = 'none';
  countEl.style.color = '#cd6a18';
  countEl.style.fontWeight = '700';
  setTimeout(() => {
    countEl.style.transition = 'color 0.8s, font-weight 0.8s';
    countEl.style.color = '';
    countEl.style.fontWeight = '';
  }, 900);

  showSuggestion(best.s, idx, best.dist, today, best.s.walkDays.includes(today));
}

async function detectLocation() {
  if (!navigator.geolocation) return;

  // If permission was already granted before, skip the prompt and go straight in
  try {
    const perm = await navigator.permissions.query({ name: 'geolocation' });
    if (perm.state === 'denied') return;

    // Use localStorage cache (valid for 1 hour) so we don't re-prompt on every visit
    const saved = JSON.parse(localStorage.getItem('shelter_loc') || 'null');
    if (saved && Date.now() - saved.t < 3_600_000) {
      handleLocation(saved.lat, saved.lng);
      return;
    }
  } catch (_) { /* permissions API not supported, continue */ }

  navigator.geolocation.getCurrentPosition(
    pos => {
      const { latitude: lat, longitude: lng } = pos.coords;
      // Save so next visit is instant — no prompt needed
      localStorage.setItem('shelter_loc', JSON.stringify({ lat, lng, t: Date.now() }));
      handleLocation(lat, lng);
    },
    () => { /* user denied — silently ignore */ },
    { maximumAge: 3_600_000, timeout: 10_000 }
  );
}

// Run on load — if already allowed it fires instantly, otherwise shows the browser prompt
detectLocation();

// Re-equalize on resize / orientation change
let _resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(() => {
    if (currentView === 'catalogue') equalizeCards();
    map.invalidateSize();
  }, 250);
});

// ── Lightbox ──
let _lbImages = [], _lbIndex = 0, _lbTouchX = 0;

function openCardLightbox(shelterIdx) {
  const s = shelters[shelterIdx];
  if (!s.gallery || s.gallery.length === 0) return;
  const cur = (window._cardCur && window._cardCur[shelterIdx]) || 0;
  openLightbox(s.gallery, cur);
}
function openLightbox(images, startIndex) {
  _lbImages = typeof images === 'string' ? JSON.parse(images) : images;
  _lbIndex = startIndex;
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.getElementById('lightbox-prev').style.display = _lbImages.length > 1 ? 'flex' : 'none';
  document.getElementById('lightbox-next').style.display = _lbImages.length > 1 ? 'flex' : 'none';
}
function updateLightbox() {
  document.getElementById('lightbox-img').src = _lbImages[_lbIndex];
  document.getElementById('lightbox-counter').textContent =
    _lbImages.length > 1 ? `${_lbIndex + 1} / ${_lbImages.length}` : '';
}
function lightboxNav(dir) {
  _lbIndex = (_lbIndex + dir + _lbImages.length) % _lbImages.length;
  updateLightbox();
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});
document.addEventListener('keydown', function(e) {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape')     closeLightbox();
  if (e.key === 'ArrowRight') lightboxNav(1);
  if (e.key === 'ArrowLeft')  lightboxNav(-1);
});

// Touch swipe on lightbox
document.getElementById('lightbox').addEventListener('touchstart', e => {
  _lbTouchX = e.touches[0].clientX;
}, { passive: true });
document.getElementById('lightbox').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - _lbTouchX;
  if (Math.abs(dx) > 50) lightboxNav(dx < 0 ? 1 : -1);
}, { passive: true });

</script>
